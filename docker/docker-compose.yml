version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    container_name: securevault_postgres
    environment:
      POSTGRES_USER: securevault_user
      POSTGRES_PASSWORD: securevault_pass
      POSTGRES_DB: securevault_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securevault_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securevault_network

  api:
    build: .
    container_name: securevault_api
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=your-secret-key
      - ENCRYPTION_KEY=your-encryption-key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - API_TITLE=SecureVault
      - API_VERSION=1.0.0
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      - RATE_LIMIT_ENABLED=True
      - RATE_LIMIT_REQUESTS=5
      - RATE_LIMIT_PERIOD=60
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - securevault_network

volumes:
  postgres_data:
networks:
  securevault_network:
    driver: bridge